        type: string
    type: object
  github_com_etkecc_mrs_internal_model.MatrixRoom:
    properties:
      avatar_url:
        type: string
      avatar_url_http:
        type: string
      canonical_alias:
        type: string
      email:
        type: string
      guest_can_join:
        type: boolean
      join_rule:
        type: string
      language:
        type: string
      name:
        type: string
      num_joined_members:
        type: integer
      parsed_at:
        type: string
      room_id:
        type: string
      room_type:
        type: string
      server:
        description: Parsed (custom) fields
        type: string
      servers:
        items:
          type: string
        type: array
      topic:
        type: string
      world_readable:
        type: boolean
    type: object
  github_com_etkecc_mrs_internal_model.MatrixServer:
    properties:
      checked_at:
        type: string
      contacts:
        allOf:
        - $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixServerContacts'
        description: Contacts as per MSC1929
      indexable:
        description: Is the server published the public room directory over federation?
        type: boolean
      name:
        description: ServerName, as per spec, e.g., "example.com"
        type: string
      online:
        description: Is the server online and federating?
        type: boolean
      online_at:
        description: |-
          OnlineAt is the prune clock: last seen online, the sole basis for the 30d offline delete. Never bumped on an offline dial.
          CheckedAt is the backoff clock: last dial attempt, bumped every dial. Merge them and dead servers reset the prune clock and go immortal.
        type: string
      software:
        description: Software running on the server, e.g., Synapse, Dendrite
        type: string
      url:
        description: Server-Server API URL, e.g., "https://example.com:8448"
        type: string
      version:
        description: Version of the software, e.g., 1.0.0
        type: string
    type: object
  github_com_etkecc_mrs_internal_model.MatrixServerContacts:
    properties:
