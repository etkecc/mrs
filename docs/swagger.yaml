        type: string
      avatar_url:
        type: string
      guest_can_join:
        type: boolean
      id:
        type: string
      join_rule:
        type: string
      language:
        type: string
      members:
        type: integer
      name:
        type: string
      room_type:
        type: string
      server:
        description: server of origin
        type: string
      servers:
        description: comma-separated list of servers
        type: string
      topic:
        type: string
      type:
        type: string
      world_readable:
