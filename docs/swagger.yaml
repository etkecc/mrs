          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.RoomDirectoryResponse'
        "401":
          description: Federation auth failed (missing or invalid X-Matrix signature)
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
      security:
      - FederationAuth: []
      summary: Public rooms directory
      tags:
      - matrix-s2s
  /_matrix/federation/v1/query/directory:
    get:
      description: 'Resolves a room alias to a room ID and the servers that can help
        you join. This is an authenticated federation endpoint: we check the incoming
        X-Matrix signature first, so a missing or bad one is a 401 before any resolution
        happens. Past that we pass back whatever status the lookup produced, so a
        404 means we genuinely could not resolve it, not that the endpoint is missing.'
      parameters:
      - description: 'Room alias to resolve, e.g. #room:server'
        in: query
        name: room_alias
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Room ID and the servers that can help you join
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.QueryDirectoryResponse'
        "401":
          description: Federation auth failed (missing or invalid X-Matrix signature)
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
        "404":
          description: Alias could not be resolved
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
      security:
      - FederationAuth: []
      summary: Resolve a room alias
      tags:
      - matrix-s2s
  /_matrix/federation/v1/version:
    get:
      description: Our federation server name and build. Static, cached, boring in
        the good way. The one endpoint here that has never once caused an incident,
        and we would like to keep it that way.
      produces:
      - application/json
      responses:
        "200":
          description: Server software name and version
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.ServerVersion'
      summary: Server version
      tags:
      - matrix-s2s
  /_matrix/key/v2/query:
    post:
      consumes:
      - application/json
      description: 'Notary lookup for a batch of servers, each returned verbatim as
        its origin signed it. Malformed JSON gets a 400. An empty batch (valid body,
        no server_keys) gets a 200 with an empty key set: you asked for nothing, you
        got nothing.'
      parameters:
      - description: Servers and key IDs to look up
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_etkecc_mrs_internal_model.QueryServerKeysRequest'
      - description: Only return keys valid until at least this timestamp (ms). A
          malformed value is treated as 0.
        in: query
        name: minimum_valid_until_ts
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Signed server keys, or an empty key set for an empty batch
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.ServerKeysQueryResponse'
        "400":
          description: Request body is not valid JSON
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
      summary: Batch query server keys
      tags:
      - matrix-s2s
  /_matrix/key/v2/query/{serverName}:
    get:
      description: Notary lookup of one remote server's signing keys, handed back
        verbatim as the server signed them (we do not re-wrap or re-sign). A server
        we cannot reach or verify yields an empty key set, not a 5xx tantrum.
      parameters:
      - description: Server name to look up keys for
        in: path
        name: serverName
        required: true
        type: string
      - description: Only return keys valid until at least this timestamp (ms). A
          malformed value is treated as 0.
        in: query
        name: minimum_valid_until_ts
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Signed server keys, or an empty key set
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.ServerKeysQueryResponse'
      summary: Query one server's keys
      tags:
      - matrix-s2s
  /_matrix/key/v2/server:
    get:
      description: Our own published ed25519 signing keys, signed by us, so federation
        can check that the requests we send are actually ours. It is a naive notary.
        verify_keys is a map because the spec key set is dynamic, keyed by key ID.
      produces:
      - application/json
      responses:
        "200":
          description: Our signed public signing keys
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.ServerKeys'
      summary: Our signing keys
      tags:
      - matrix-s2s
  /_matrix/media/r0/thumbnail/{name}/{id}:
    get:
      description: Serves a media thumbnail. Tries the unauthenticated client-server
        media API first (faster), then falls back to the authenticated federation
        media API. Streams the image on a hit, or 204 when there is nothing to serve.
        Standard Matrix thumbnail query params (width, height, method) are passed
        straight through.
      parameters:
      - description: Media origin server name
        in: path
        name: name
        required: true
        type: string
      - description: Media ID
        in: path
        name: id
        required: true
        type: string
      - description: Thumbnail width
        in: query
        name: width
        type: integer
      - description: Thumbnail height
        in: query
        name: height
        type: integer
      - description: 'Resize method: crop or scale'
        in: query
        name: method
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: Thumbnail image
          schema:
            type: file
        "204":
          description: No thumbnail available
      summary: Media thumbnail
      tags:
      - media
  /_matrix/media/v3/thumbnail/{name}/{id}:
    get:
      description: Serves a media thumbnail. Tries the unauthenticated client-server
        media API first (faster), then falls back to the authenticated federation
        media API. Streams the image on a hit, or 204 when there is nothing to serve.
        Standard Matrix thumbnail query params (width, height, method) are passed
        straight through.
      parameters:
      - description: Media origin server name
        in: path
        name: name
        required: true
        type: string
      - description: Media ID
        in: path
        name: id
        required: true
        type: string
      - description: Thumbnail width
        in: query
        name: width
        type: integer
      - description: Thumbnail height
        in: query
        name: height
        type: integer
      - description: 'Resize method: crop or scale'
        in: query
        name: method
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: Thumbnail image
          schema:
            type: file
        "204":
          description: No thumbnail available
      summary: Media thumbnail
      tags:
      - media
  /avatar/{name}/{id}:
    get:
      description: Serves a media thumbnail. Tries the unauthenticated client-server
        media API first (faster), then falls back to the authenticated federation
        media API. Streams the image on a hit, or 204 when there is nothing to serve.
        Standard Matrix thumbnail query params (width, height, method) are passed
        straight through.
      parameters:
      - description: Media origin server name
        in: path
        name: name
        required: true
        type: string
      - description: Media ID
        in: path
        name: id
        required: true
        type: string
      - description: Thumbnail width
        in: query
        name: width
        type: integer
      - description: Thumbnail height
        in: query
        name: height
        type: integer
      - description: 'Resize method: crop or scale'
        in: query
        name: method
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: Thumbnail image
          schema:
            type: file
        "204":
          description: No thumbnail available
      summary: Media thumbnail
      tags:
      - media
  /catalog/rooms:
    get:
      description: Every indexed room as a room-ID to alias map. Big, authenticated,
        and exactly as heavy as it sounds.
      produces:
      - application/json
      responses:
        "200":
          description: Room ID to alias
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CatalogAuth: []
      summary: All rooms
      tags:
      - catalog
  /catalog/servers:
    get:
      description: The servers the crawler currently considers online.
      produces:
      - application/json
      responses:
        "200":
          description: Online server names
          schema:
            items:
              type: string
            type: array
      security:
      - CatalogAuth: []
      summary: Online servers
      tags:
      - catalog
  /catalog/servers/objects:
    get:
      description: Online servers with their full crawl records, keyed by server name.
      produces:
      - application/json
      responses:
        "200":
          description: Server name to crawl record
          schema:
            additionalProperties:
              $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixServer'
            type: object
      security:
      - CatalogAuth: []
      summary: Online servers with details
      tags:
      - catalog
  /discover/{name}:
    post:
      description: 'Queues a single server for discovery. Auth is optional: send Discovery
        credentials to skip the rate limit, or call anonymously and take the limit.
        We dial the server before answering, so the status code tells you what actually
        happened: 201 if it is reachable and freshly added, 208 if we already knew
        it, 422 if it would not answer (we record it offline rather than re-dial it
        on every retry).'
      parameters:
      - description: Server name to add
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Server was reachable and queued
        "208":
          description: Server already known, nothing to do
        "401":
          description: Invalid Discovery credentials (only if you send them)
        "422":
          description: Server could not be reached, nothing added
        "429":
          description: Rate limited (anonymous callers)
      summary: Add a server
      tags:
      - discovery
  /discover/bulk:
    post:
      consumes:
      - application/json
      description: 'Queues a batch of servers for discovery. Requires Discovery credentials.
        Fire-and-forget: we take the JSON array, return 202 immediately, and discover
        them in the background.'
      parameters:
      - description: Server names to add
        in: body
        name: request
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "202":
          description: Batch accepted for background discovery
        "400":
          description: Malformed request body (not a JSON array of server names)
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
        "401":
          description: Invalid Discovery credentials
      security:
      - DiscoveryAuth: []
      summary: Add servers in bulk
      tags:
      - discovery
  /discover/msc1929/{name}:
    post:
      description: 'Fetches and validates a server''s MSC1929 support file (the contacts
        in /.well-known/matrix/support). Returns 204 when it is valid, or 400 with
        a list of the specific problems: empty file, a contact missing a role, an
        unsupported role, no contacts at all, or the deprecated ''admins'' field.
        A handy pre-flight before relying on a server''s support contacts.'
      parameters:
      - description: Server name to check
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Support file is valid
        "400":
          description: Support file is missing, unreachable, or invalid
          schema:
            items:
              $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
            type: array
      summary: Check a server's MSC1929 support file
      tags:
      - discovery
  /mod/ban/{room_id}:
    get:
      description: Bans a room from the index. Yes, it is a GET that mutates state,
        we know, and no, we are not proud of it. And a User-Agent containing "bot"
        gets a 403 even with valid credentials, a scar from crawlers tripping this,
        not a feature. Both are real behavior, documented on purpose so they surprise
        you here and not in production.
      parameters:
      - description: Room ID to ban
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Confirmation message
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: User-Agent contains 'bot'
      security:
      - ModerationAuth: []
      summary: Ban a room
      tags:
      - moderation
  /mod/list:
    get:
      description: Lists banned room IDs. Append /{server_name} to filter to a single
        server. An empty list is a 204, not an empty 200. As with the rest of the
        mod group, a "bot" User-Agent gets a 403 even authenticated.
      produces:
      - application/json
      responses:
        "200":
          description: Banned room IDs
          schema:
            items:
              type: string
            type: array
        "204":
          description: No banned rooms
        "403":
          description: User-Agent contains 'bot'
      security:
      - ModerationAuth: []
      summary: List banned rooms
      tags:
      - moderation
  /mod/list-reported:
    get:
      description: Lists reported rooms as a room-ID to reason map. Append /{server_name}
        to filter to a single server. Empty is a 204. A "bot" User-Agent gets a 403
        even authenticated.
      produces:
      - application/json
      responses:
        "200":
          description: Room ID to report reason
          schema:
            additionalProperties:
              type: string
            type: object
        "204":
          description: No reported rooms
        "403":
          description: User-Agent contains 'bot'
      security:
      - ModerationAuth: []
      summary: List reported rooms
      tags:
      - moderation
  /mod/report/{room_id}:
    post:
      consumes:
      - application/json
      description: 'Report a room for moderation. Open on purpose, no auth: anyone
        can flag a room, that is the whole point. The JSON body carries `reason` (5
        chars minimum, or you get a 400) and an optional `no_msc1929` flag. This is
        the one honest, no-auth POST in the moderation set.'
      parameters:
      - description: Room ID being reported
        in: path
        name: room_id
        required: true
        type: string
      - description: Report reason (5 chars minimum) and options
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_controllers.reportSubmission'
      produces:
      - application/json
      responses:
        "202":
          description: Report accepted
        "400":
          description: Invalid room ID, or reason too short or missing
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
        "500":
          description: Internal error while processing the report
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
      summary: Report a room
      tags:
      - moderation
  /mod/unban/{room_id}:
    get:
      description: 'Lifts a room ban. Same shape as ban: a state-changing GET, and
        a "bot" User-Agent gets a 403 even authenticated. Real behavior, owned.'
      parameters:
      - description: Room ID to unban
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Confirmation message
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: User-Agent contains 'bot'
      security:
      - ModerationAuth: []
      summary: Unban a room
      tags:
      - moderation
  /mod/unreport/{room_id}:
    get:
      description: 'Clears reports on a room. Two warts, both owned: it is a state-changing
        GET, and a User-Agent containing "bot" gets a 403 even with valid moderation
        credentials, a scar from crawlers tripping these endpoints, not a feature.
        There is also a no-room-id form (GET /mod/unreport) that hits the same handler
        with an empty ID.'
      parameters:
      - description: Room ID to clear reports for
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Reports cleared
        "403":
          description: User-Agent contains 'bot'
      security:
      - ModerationAuth: []
      summary: Clear a room's reports
      tags:
      - moderation
  /room/{room_id_or_alias}:
    get:
      description: 'Room preview by ID or alias: like the Matrix client-server room
        preview, but enriched with everything MRS knows about a room (language and
        so on). We try our own index first, then fall back to a live MSC3266 summary,
        and when that fallback fires we set the `X-MRS-MSC3266: true` response header
        so you can tell. Marked EXPERIMENT in the source, so treat the shape as not
        yet frozen.'
      parameters:
      - description: Room ID or alias
        in: path
        name: room_id_or_alias
        required: true
        type: string
      - description: Server to try for the MSC3266 fallback if we do not have the
          room indexed
        in: query
        name: via
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Room data
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixRoom'
        "404":
          description: Room not found anywhere we looked
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
        "500":
          description: Internal error reading the room
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.MatrixError'
      summary: Room preview
      tags:
      - catalog
  /search:
    get:
      description: 'Full-text room search. Pass the query and options as query params
        here: ?q= (query), ?l= (limit), ?o= (offset), ?s= (sort), ?rt= (room type).
        The same handler also answers a positional path form for convenience, /search/{q},
        /search/{q}/{l}, and so on up to /search/{q}/{l}/{o}/{s}/{rt}, filling those
        five slots left to right. An empty result set is a 204, not an empty 200.'
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Limit
        in: query
        name: l
        type: integer
      - description: Offset
        in: query
        name: o
        type: integer
      - description: Sort field
        in: query
        name: s
        type: string
      - description: Room type filter
        in: query
        name: rt
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Matching rooms
          schema:
            items:
              $ref: '#/definitions/github_com_etkecc_mrs_internal_model.Entry'
            type: array
        "204":
          description: No matches
      summary: Search rooms
      tags:
      - search
  /stats:
    get:
      description: 'Live index counts: servers found online and indexable, rooms indexed
        and parsed, plus the server software breakdown (how much of the federation
        is Synapse, basically). Timeline is present only once we have history behind
        us; on a fresh index the key is absent, not an empty array.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_etkecc_mrs_internal_model.StatsResponse'
      summary: Crawler statistics
produces:
- application/json
schemes:
- https
securityDefinitions:
  AdminAuth:
    type: basic
  CatalogAuth:
    type: basic
  DiscoveryAuth:
    type: basic
  FederationAuth:
    description: 'Matrix federation signature auth: an `Authorization: X-Matrix origin=...,key=...,sig=...`
      header carrying an ed25519 signature over the request, which we verify against
      the origin server''s published keys.'
    in: header
    name: Authorization
    type: apiKey
  MetricsAuth:
    type: basic
  ModerationAuth:
    type: basic
swagger: "2.0"
