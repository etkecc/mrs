      next_batch:
        type: string
      prev_batch:
        type: string
      total_room_count_estimate:
        type: integer
    type: object
  github_com_etkecc_mrs_internal_model.RoomDirectoryRoom:
    properties:
      avatar_url:
        type: string
      canonical_alias:
        type: string
      guest_can_join:
        type: boolean
      join_rule:
        type: string
      name:
        type: string
      num_joined_members:
        type: integer
      room_id:
        type: string
      room_type:
        type: string
      topic:
        type: string
      world_readable:
        type: boolean
    type: object
  github_com_etkecc_mrs_internal_model.RoomVisibility:
    properties:
      visibility:
